<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Charulota - Handcrafted Elegance</title>
    <style>
        :root {
            --accent: #d63384;
            --dark: #333;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--bg);
            overflow-x: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* Navigation */
        nav {
            background: white;
            color: var(--dark);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-name {
            color: var(--accent);
            font-family: 'Georgia', serif;
            margin: 0;
            font-size: 28px;
        }

        .category-nav {
            background: white;
            padding: 10px 50px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            border-bottom: 1px solid #eee;
            scrollbar-width: none;
        }

        .category-nav::-webkit-scrollbar {
            display: none;
        }

        .cat-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
            font-size: 0.9em;
            font-weight: 600;
            width: auto !important;
            color: var(--dark);
        }

        .cat-btn:hover,
        .cat-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

    
        .container {
            padding: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .brand {
            color: #888;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price {
            color: var(--accent);
            font-size: 1.4em;
            font-weight: bold;
            margin: 15px 0;
        }

  
        button {
            background: var(--dark);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        button:hover {
            background: var(--accent);
        }

        .logout {
            color: #ff4d4d;
            cursor: pointer;
            text-decoration: underline;
            margin-left: 20px;
            font-size: 0.9em;
        }

  
        #cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            transition: 0.3s;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #cart-sidebar.open {
            right: 0;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <nav id="main-nav">
        <h2 class="brand-name">🌸 Charulota</h2>
        <div style="display: flex; align-items: center;">
            <span id="welcome-msg" style="font-weight: 500;"></span>
            <div style="margin-left: 20px; cursor: pointer; position: relative;" onclick="toggleCart()">
                <span style="font-size: 24px;">🛒</span>
                <span id="cart-count"
                    style="background: var(--accent); color: white; border-radius: 50%; padding: 2px 7px; font-size: 12px; position: absolute; top: -5px; right: -10px;">0</span>
            </div>
            <span class="logout" onclick="logout()">Logout</span>
        </div>
        <div style="flex-grow: 1; margin: 0 40px; display: flex; gap: 10px;">
            <input type="text" id="search-input" placeholder="Search for elegance..."
                style="width: 100%; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none;">
            <button onclick="executeSearch()" style="width: auto; padding: 0 20px; border-radius: 20px;">Search</button>
        </div>
    </nav>

    <div class="category-nav">
        <button class="cat-btn active" onclick="filterByCategory(this, 'All')">All Collection</button>
        <button class="cat-btn" onclick="filterByCategory(this, 'Women')">Women</button>
        <button class="cat-btn" onclick="filterByCategory(this, 'Men')">Men</button>
        <button class="cat-btn" onclick="filterByCategory(this, 'Kids')">Kids</button>
   </div>

    <div id="cart-sidebar">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3>Shopping Bag</h3>
            <span onclick="toggleCart()" style="cursor:pointer; font-size: 28px;">&times;</span>
        </div>
        <div id="cart-items" style="flex-grow: 1; overflow-y: auto; margin-top: 20px;"></div>
        <div style="border-top: 2px solid #eee; padding-top: 20px;">
            <div style="display:flex; justify-content: space-between; font-size: 1.2em; font-weight: bold;">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button style="margin-top: 15px; background: #28a745;" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <div class="container">
        <h1 id="page-title" style="margin-bottom: 30px; border-left: 5px solid var(--accent); padding-left: 15px;">New
            Arrivals</h1>
        <div id="product-list" class="grid">
            <p>Gathering the collection...</p>
        </div>
    </div>
    <div style="display: flex; align-items: center;">
        <span id="welcome-msg" style="font-weight: 500;"></span>
        <a href="profile.html"
            style="margin-left: 20px; color: var(--dark); text-decoration: none; font-weight: 600;">👤 My Profile</a>
        ...
    </div>

    <script>
        let cart = [];

        const userName = localStorage.getItem('userName');
        const customerId = localStorage.getItem('customerId');

        if (!userName || !customerId) {
            window.location.href = 'login.html';
        }
        document.getElementById('welcome-msg').innerText = "Hello, " + userName;

        async function fetchProducts(category = 'All', searchTerm = '') {
            try {
                const container = document.getElementById('product-list');
                let url = `/api/products?cat=${encodeURIComponent(category)}&search=${encodeURIComponent(searchTerm)}`;

                const res = await fetch(url);
                const products = await res.json();

                if (!products || products.length === 0) {
                    container.innerHTML = `<p>No products found in this collection.</p>`;
                    return;
                }

                container.innerHTML = products.map(p => {
                   
                    const targetId = p.VARIANT_ID || p.PRODUCT_ID;
                    return `
    <div class="product-card" style="cursor: pointer;" onclick="location.href='product-details.html?id=${p.PRODUCT_ID}'">
        <span class="brand">${p.BRAND || 'Charulota'}</span>
        <h3>${p.PRODUCT_NAME}</h3>
        <p class="price">$${p.BASE_PRICE}</p>
        
       
    </div>
`;
                }).join('');
            } catch (err) {
                console.error("Error rendering products:", err);
            }
        }
        async function syncCart() {
            if (!customerId) return;
            try {
                const res = await fetch(`/api/cart/${customerId}`);
                const data = await res.json();

                cart = data.map(item => ({
                    id: item.VARIANT_ID || item.PRODUCT_ID,
                    name: item.PRODUCT_NAME,
                    price: item.BASE_PRICE,
                    qty: item.QUANTITY
                }));

                renderUI();
            } catch (err) {
                console.error("Sync error:", err);
            }
        }

        function renderUI() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');

            let total = 0;
            let count = 0;

            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; margin-top:20px;">Your bag is empty</p>';
            } else {
                container.innerHTML = cart.map(item => {
                    total += (item.price * item.qty);
                    count += item.qty;
                    return `
            <div class="cart-item">
                <div style="flex-grow: 1;">
                    <div style="font-weight:bold;">${item.name}</div>
                    <div style="font-size:0.9em; color:var(--accent); font-weight:bold;">$${item.price}</div>
                    
                    <div style="display: flex; align-items: center; margin-top: 5px; gap: 10px;">
                        <button onclick="updateQuantity(${item.id}, 'minus')" 
                                style="width:25px; height:25px; padding:0; background:#eee; color:black; border-radius:4px;">-</button>
                        
                        <span style="font-weight:bold;">${item.qty}</span>
                        
                        <button onclick="updateQuantity(${item.id}, 'plus')" 
                                style="width:25px; height:25px; padding:0; background:#eee; color:black; border-radius:4px;">+</button>
                    </div>
                </div>
                <button onclick="deleteFromCart(${item.id})" 
                        style="width:auto; background:none; color:#ccc; font-size:18px; border:none; padding:10px;">&times;</button>
            </div>
        `;
                }).join('');
            }

            totalEl.innerText = "$" + total.toFixed(2);
            countEl.innerText = count;
        }
        async function addToCart(id, name, price) {
            try {
                const res = await fetch('/api/cart/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customerId: Number(customerId),
                        variantId: Number(id),
                        quantity: 1
                    })
                });

                if (res.ok) {
                    console.log("Added to DB");
                    await syncCart(); 
                    document.getElementById('cart-sidebar').classList.add('open');
                }
            } catch (err) {
                console.error("Add error:", err);
            }
        }


        
        async function deleteFromCart(vId) {
            try {
                const res = await fetch('/api/cart/remove', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customerId: Number(customerId),
                        variantId: Number(vId)
                    })
                });

                if (res.ok) {
                    console.log("Deleted from DB");
                    await syncCart(); 
                }
            } catch (err) {
                console.error("Delete error:", err);
            }
        }

        async function updateQuantity(vId, action) {
        
            const url = action === 'minus' ? '/api/cart/remove-one' : '/api/cart/add';
            const method = action === 'minus' ? 'DELETE' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customerId: Number(customerId),
                        variantId: Number(vId),
                        quantity: 1
                    })
                });

                if (res.ok) {
                    await syncCart(); 
                }
            } catch (err) {
                console.error("Update quantity error:", err);
            }
        }

        async function checkout() {
            if (cart.length === 0) return alert("Your bag is empty!");

            const confirmPayment = confirm("Proceed to pay $" + document.getElementById('cart-total').innerText + "?");

            if (confirmPayment) {
                try {
                    const res = await fetch('/api/cart/checkout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ customerId: Number(customerId) })
                    });

                    if (res.ok) {
                        alert("Payment Successful! Your order is on the way.");
                        await syncCart(); 
                        toggleCart();   
                    } else {
                        alert("Payment failed. Please try again.");
                    }
                } catch (err) {
                    console.error("Checkout Error:", err);
                }
            }
        }
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
        // 1. Function for the Search Button
        function executeSearch() {
            const term = document.getElementById('search-input').value;
          
            fetchProducts('All', term);
        }

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                executeSearch();
            }
        })

        async function init() {
            await syncCart();    
            await fetchProducts(); 
        }

        init();

  
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value;
            if (term.length > 2 || term.length === 0) {
                fetchProducts('All', term);
            }
        });

        function filterByCategory(btn, category) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('page-title').innerText = category === 'All' ? 'New Arrivals' : category;
            fetchProducts(category);
        }
    </script>
</body>

<footer style="margin-top: 50px; padding: 20px; text-align: center; background: #eee; font-size: 0.8em;">
    <p>&copy; 2026 Charulota Handcrafted Elegance</p>
    <a href="admin-login.html" style="color: #888; text-decoration: none;">Admin Staff Login</a>
</footer>

</html>
