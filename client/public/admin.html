<!DOCTYPE html>
<html>

<head>
    <title>Charulota Admin</title>
    <style>
        table th,
        table td {
            border-bottom: 1px solid #ddd;
            padding: 12px;
        }

        body {
            font-family: sans-serif;
            display: flex;
            margin: 0;
            background: #f0f2f5;
        }

        #sidebar {
            width: 250px;
            background: #333;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        #content {
            flex-grow: 1;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-approve {
            background: #28a745;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        .status-tag {
            background: #fff3cd;
            color: #856404;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }
    </style>
</head>

<body>

   <div id="sidebar">
    <h2>Admin Panel</h2>
    <p style="cursor:pointer" onclick="showSection('add-prod')">➕ Add Product</p>
    <p style="cursor:pointer" onclick="showSection('manage-orders')">📦 Manage Orders</p>
    <p style="cursor:pointer" onclick="showSection('manage-qa')">💬 Q&A Forum</p>
    <p style="cursor:pointer" onclick="showSection('manage-inventory')">📊 Manage Inventory</p>
</div>

    <div id="content">
       <div id="section-inventory" class="card" style="display:none;">
    <h3>Bulk Stock Management</h3>
    
    <div style="display: flex; gap: 20px; margin-bottom: 20px;">
        <div style="flex: 2;">
            <label>1. Select Product</label>
            <select id="inv-product" onchange="loadColorStock()"></select>
        </div>
        <div style="flex: 1;">
            <label>2. Select Color</label>
            <select id="inv-color" onchange="loadColorStock()"></select>
        </div>
    </div>

    <div id="inventory-status-msg" style="color: #666; margin-bottom: 10px; font-style: italic;">
        Select product and color to view stock...
    </div>

    <div id="size-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
        </div>

    <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
        <button class="btn-approve" onclick="saveAllVisibleStock()" style="width: 100%; padding: 15px; font-weight: bold;">
            Update All Sizes for this Color
        </button>
    </div>
</div>
  

        <div id="section-manage-qa" class="card" style="display:none;">
    <h3>Manage Customer Questions</h3>
    <div id="qa-container">
        </div>
</div>

        <div id="section-add-prod" class="card">
            <h3>Add New Product</h3>

            <label>General Info</label>
            <input type="text" id="p-name" placeholder="Product Name">
            <input type="text" id="p-brand" placeholder="Brand">
            <input type="number" id="p-price" placeholder="Base Price">

            <label>Category</label>
            <select id="p-cat">
                <option value="1">Saree / Women</option>
                <option value="2">Men's Wear</option>
                <option value="3">Jewellery</option>
                <option value="4">Accessories</option>
            </select>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Color</label>
                    <select id="p-color">
                        <option value="1">Red</option>
                        <option value="2">Blue</option>
                        <option value="3">Black</option>
                       
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>Size</label>
                    <select id="p-size">
                        <option value="1">32</option>
                        <option value="2">34</option>
                        <option value="3">36</option>
                        <option value="4">38</option>
                        <option value="5">40</option>
                        <option value="6">42</option>
                        <option value="7">44</option>
                        <option value="8">46</option>
                    </select>
                </div>
            </div>

            <label>Initial Stock Quantity</label>
            <input type="number" id="p-stock" value="100">
            <textarea id="p-desc" placeholder="Description"></textarea>

            <button onclick="submitProduct()"
                style="background: #d63384; color:white; padding:10px; border:none; width:100%; margin-top: 10px; cursor: pointer;">
                Save Product to Database
            </button>
        </div>
        <div id="section-manage-orders" class="card" style="display:none;">
            <h3>Manage Customer Orders</h3>
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <thead>
                    <tr style="background: #f8f9fa; text-align: left; border-bottom: 2px solid #dee2e6;">
                        <th style="padding: 12px;">Order ID</th>
                        <th style="padding: 12px;">Customer</th>
                        <th style="padding: 12px;">Total Amount</th>
                        <th style="padding: 12px;">Status</th>
                        <th style="padding: 12px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    <tr>
                        <td colspan="5" style="text-align:center; padding:20px;">Loading orders...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const adminId = localStorage.getItem('adminId');
        const role = localStorage.getItem('role');

        if (!adminId || role !== 'admin') {
            alert("Access Denied! Admins only.");
            window.location.href = 'admin-login.html';

        }
       function showSection(id) {
    document.getElementById('section-add-prod').style.display = id === 'add-prod' ? 'block' : 'none';
    document.getElementById('section-manage-orders').style.display = id === 'manage-orders' ? 'block' : 'none';
    document.getElementById('section-manage-qa').style.display = id === 'manage-qa' ? 'block' : 'none';
    // Add this line
    document.getElementById('section-inventory').style.display = id === 'manage-inventory' ? 'block' : 'none';
    
    if (id === 'manage-orders') loadAllOrders();
    if (id === 'manage-qa') loadPendingQuestions();
    // Add this line
    if (id === 'manage-inventory') loadInventory(); 
}
async function loadPendingQuestions() {
    console.log("Fetching questions...");
    try {
        const res = await fetch('/api/admin/pending-questions');
        const data = await res.json();
        const container = document.getElementById('qa-container');
        
        if (data.length === 0) {
            container.innerHTML = '<p>No pending questions found.</p>';
            return;
        }

      
        container.innerHTML = `
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background:#f8f9fa; text-align:left;">
                        <th style="padding:10px;">Product</th>
                        <th style="padding:10px;">Question</th>
                        <th style="padding:10px;">Answer</th>
                    </tr>
                </thead>
                <tbody id="qa-body"></tbody>
            </table>
        `;

        const tbody = document.getElementById('qa-body');
        tbody.innerHTML = data.map(q => `
            <tr>
                <td style="padding:10px;">${q.PRODUCT_NAME || q.product_name}</td>
                <td style="padding:10px;">${q.QUESTION_TEXT || q.question_text}</td>
                <td style="padding:10px;">
                    <textarea id="ans-${q.QUESTION_ID || q.question_id}" style="width:100%;" placeholder="Type answer..."></textarea>
                    <button class="btn-approve" onclick="submitAnswer(${q.QUESTION_ID || q.question_id})">Post Answer</button>
                </td>
            </tr>
        `).join('');

    } catch (err) {
        console.error("Fetch Error:", err);
    }
}
async function loadInventory() {
    try {
        // Fetch Products and Colors to fill the dropdowns first
        const [pRes, cRes] = await Promise.all([
            fetch('/api/admin/products-list'),
            fetch('/api/admin/colors-list')
        ]);
        
        const products = await pRes.json();
        const colors = await cRes.json();

        document.getElementById('inv-product').innerHTML = products.map(p => 
            `<option value="${p.PRODUCT_ID}">${p.PRODUCT_NAME}</option>`).join('');

        document.getElementById('inv-color').innerHTML = colors.map(c => 
            `<option value="${c.COLOR_ID}">${c.COLOR_NAME}</option>`).join('');

 
        loadColorStock();
    } catch (err) {
        console.error("Error initializing inventory UI:", err);
    }
}
async function loadColorStock() {
    const pId = document.getElementById('inv-product').value;
    const cId = document.getElementById('inv-color').value;
    const grid = document.getElementById('size-grid');
    const msg = document.getElementById('inventory-status-msg');

    try {
        const res = await fetch(`/api/admin/get-color-stock?productId=${pId}&colorId=${cId}`);
        const stockData = await res.json();

        const stockMap = {};
        stockData.forEach(item => {
            stockMap[item.SIZE_LABEL] = { id: item.VARIANT_ID, qty: item.STOCK_QUANTITY };
        });

        let html = '';
        for (let size = 32; size <= 46; size += 2) {
            const sizeStr = size.toString();
            const data = stockMap[sizeStr] || { id: null, qty: 0 };
            
            html += `
                <div style="background: #f8f9fa; padding: 10px; border: 1px solid #ddd; border-radius: 4px; text-align:center;">
                    <label style="font-weight: bold; display: block;">Size ${size}</label>
                    <div style="font-size: 0.8em; color: ${data.id ? '#666' : '#d63384'}; margin-bottom: 5px;">
                        ${data.id ? 'Current: ' + data.qty : 'Not Created'}
                    </div>
                    <input type="number" 
                           class="bulk-stock-input" 
                           data-size="${sizeStr}" 
                           value="${data.qty}" 
                           style="width: 70px; text-align: center; margin: 0 auto; border: 1px solid #d63384;">
                </div>
            `;
        }
        
        grid.innerHTML = html;
        msg.innerText = "Enter stock quantities for any size and click 'Update All' below.";

    } catch (err) {
        console.error("Load Error:", err);
    }
}
async function saveAllVisibleStock() {
    const pId = document.getElementById('inv-product').value;
    const cId = document.getElementById('inv-color').value;
    const inputs = document.querySelectorAll('.bulk-stock-input');
    
    
    for (const input of inputs) {
        const sizeLabel = input.parentElement.querySelector('label').innerText.replace('Size ', '');
        const newStockValue = Number(input.value);

        try {
            const res = await fetch('/api/admin/update-stock', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    productId: Number(pId),
                    colorId: Number(cId),
                    sizeLabel: sizeLabel, // Sending "32", "34", etc.
                    newStock: newStockValue
                })
            });

            if (!res.ok) {
                const error = await res.json();
                console.error(`Error updating size ${sizeLabel}:`, error);
            }
        } catch (err) {
            console.error("Fetch failed:", err);
        }
    }
    alert("Inventory Update Attempted! Refreshing view...");
    loadColorStock(); 
}
async function handleStockUpdate(sizeId, amount) {
    const pId = document.getElementById('inv-product').value;
    const cId = document.getElementById('inv-color').value;
    
  
    const input = document.getElementById(`stock-input-${sizeId}`);
    const currentVal = parseInt(input.value) || 0;
    
  
    const newTotal = Math.max(0, currentVal + amount);


    const res = await fetch('/api/admin/update-stock', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            productId: pId, 
            colorId: cId, 
            sizeId: sizeId, 
            newStock: newTotal 
        })
    });

    if (res.ok) {
        input.value = newTotal; 
    }
}
async function submitAnswer(qid) {
    const text = document.getElementById(`ans-${qid}`).value;
    if (!text) return alert("Please enter an answer!");
    
    const res = await fetch('/api/qa/answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ questionId: qid, adminId: localStorage.getItem('adminId'), text })
    });
    
    if (res.ok) {
        alert("Answer posted!");
        loadPendingQuestions(); // Refresh list
    }
}
        async function submitProduct() {
            const data = {
                name: document.getElementById('p-name').value,
                brand: document.getElementById('p-brand').value,
                price: Number(document.getElementById('p-price').value),
                category: Number(document.getElementById('p-cat').value),
                description: document.getElementById('p-desc').value,
         
                colorId: Number(document.getElementById('p-color').value),
                sizeId: Number(document.getElementById('p-size').value),
                stock: Number(document.getElementById('p-stock').value)
            };

            if (!data.name || !data.price) {
                alert("Please fill in the product name and price.");
                return;
            }

            try {
                const res = await fetch('/api/admin/add-product', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert("Product and Variant Added Successfully!");
          
                    document.getElementById('p-name').value = "";
                    document.getElementById('p-price').value = "";
                } else {
                    const errData = await res.json();
                    alert("Error: " + errData.error);
                }
            } catch (err) {
                console.error("Submission error:", err);
                alert("Failed to connect to server.");
            }
        }
        async function loadAllOrders() {
    try {
        const res = await fetch('/api/admin/all-orders');
        const orders = await res.json();
        const tbody = document.getElementById('orders-table-body');

        if (orders.length === 0) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:20px;'>No orders found.</td></tr>";
            return;
        }

        tbody.innerHTML = orders.map(o => {
            // Logic to pick a color based on status text
            let statusClass = "status-tag";
            if (o.ORDER_STATUS === 'Shipped') statusClass += " status-shipped";
            if (o.ORDER_STATUS === 'Paid') statusClass += " status-paid";

            return `
            <tr>
                <td style="font-weight: bold; color: #333;">#${o.ORDER_ID}</td>
                <td>
                    <div style="font-weight: 600;">${o.NAME}</div>
                    <div style="font-size: 0.8em; color: #777;">Cust ID: ${o.CUSTOMER_ID}</div>
                </td> 
                <td style="font-weight: bold;">$${Number(o.TOTAL_AMOUNT).toFixed(2)}</td>
                <td><span class="${statusClass}">${o.ORDER_STATUS}</span></td>
                <td>
                    ${o.ORDER_STATUS === 'Paid' || o.ORDER_STATUS === 'Pending'
                        ? `<button class="btn-approve" onclick="approveOrder(${o.ORDER_ID})">Approve & Ship</button>`
                        : '<b style="color: #28a745;">✓ Shipped</b>'}
                </td>
            </tr>
            `;
        }).join('');
    } catch (err) {
        console.error("Failed to load orders:", err);
    }
}
        async function approveOrder(id) {
            await fetch('/api/admin/approve-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orderId: id })
            });
            loadAllOrders();
        }
    </script>
</body>

</html>
