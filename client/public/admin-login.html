<!DOCTYPE html>
<html>
<head>
    <title>Charulota | Admin Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; }
        .login-card { background: white; padding: 40px; border-radius: 10px; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #333; color: white; border: none; cursor: pointer; }
        button:hover { background: #d63384; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color: #d63384;">🌸 Admin Portal</h2>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleLogin()">Login to Dashboard</button>
        <p id="msg" style="color: red; font-size: 0.8em;"></p>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;

            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (res.ok) {

                localStorage.setItem('adminId', data.admin.id);
                localStorage.setItem('adminName', data.admin.name);
                localStorage.setItem('role', 'admin');
                
                window.location.href = 'admin.html';
            } else {
                document.getElementById('msg').innerText = data.error;
            }
        }
    </script>
</body>
</html>
