<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Charulota</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --rose:       #be185d;
  --rose-dark:  #9d174d;
  --rose-soft:  #fdf2f8;
  --rose-mid:   #fbcfe8;
  --ink:        #0f0a14;
  --ink-mid:    #3d2e47;
  --ink-faint:  #7c6d85;
  --surface:    #faf9fb;
  --panel:      #ffffff;
  --border:     #ede7f0;
  --green:      #15803d;
  --green-bg:   #f0fdf4;
  --red:        #be123c;
  --red-bg:     #fff1f2;
  --blue:       #1d4ed8;
  --blue-bg:    #eff6ff;
  --amber:      #b45309;
  --amber-bg:   #fffbeb;
  --gray:       #4b5563;
  --gray-bg:    #f3f4f6;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--surface);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
}
.topbar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.45rem;
  font-weight: 700;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 7px;
  text-decoration: none;
}
.topbar-brand span { color: var(--rose); }
.topbar-nav { display: flex; align-items: center; gap: 8px; }
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--ink-faint);
  padding: 7px 16px;
  border-radius: 9px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.18s;
}
.back-btn:hover { border-color: var(--rose); color: var(--rose); }
.page {
  max-width: 780px;
  margin: 0 auto;
  padding: 32px 24px 60px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 26px;
  margin-bottom: 22px;
  animation: fadeUp 0.4s ease both;
}
.card:nth-child(2) { animation-delay: 0.07s; }
.card:nth-child(3) { animation-delay: 0.14s; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--ink);
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.profile-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--rose-soft);
  border: 2px solid var(--rose-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--rose);
  flex-shrink: 0;
}
.profile-meta-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}
.profile-meta-id {
  font-size: 0.78rem;
  color: var(--ink-faint);
  margin-top: 2px;
}
.field-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--ink-faint);
  margin-bottom: 6px;
  margin-top: 16px;
}
.field-label:first-child { margin-top: 0; }
input[type=tel], textarea {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  color: var(--ink);
  background: var(--surface);
  outline: none;
  transition: border-color 0.18s, background 0.18s;
}
input[type=tel]:focus, textarea:focus {
  border-color: var(--rose);
  background: #fff;
}
textarea { height: 72px; resize: vertical; }
.btn-row { display: flex; gap: 10px; margin-top: 20px; }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px 22px;
  border-radius: 9px;
  border: none;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.16s;
}
.btn-ghost {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--ink-faint);
  flex: 1;
}
.btn-ghost:hover { border-color: var(--rose); color: var(--rose); }
.btn-save {
  background: var(--green);
  color: #fff;
  flex: 1;
}
.btn-save:hover { background: #166534; transform: translateY(-1px); }
.order-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 13px;
  padding: 20px;
  margin-bottom: 14px;
  transition: border-color 0.18s;
}
.order-box:hover { border-color: var(--rose-mid); }
.order-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.order-id {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--rose);
}
.order-date {
  font-size: 0.78rem;
  color: var(--ink-faint);
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.tag {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 50px;
  font-size: 0.72rem;
  font-weight: 700;
}
.tag-Pending   { background: var(--amber-bg); color: var(--amber); }
.tag-Shipped   { background: var(--blue-bg);  color: var(--blue); }
.tag-Delivered { background: var(--green-bg); color: var(--green); }
.tag-Cancelled { background: var(--red-bg);   color: var(--red); }
.tag-Returned  { background: var(--gray-bg);  color: var(--gray); }
.item-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  color: var(--ink-mid);
  padding: 4px 0;
}
.item-qty { color: var(--ink-faint); font-size: 0.8rem; }
.order-total {
  display: flex;
  justify-content: flex-end;
  font-weight: 600;
  font-size: 0.9rem;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
  color: var(--ink);
}
.tracker-wrap {
  margin: 18px 0 4px;
  position: relative;
}
.tracker {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  position: relative;
}
.tracker-rail {
  position: absolute;
  top: 15px;
  left: 24px;
  right: 24px;
  height: 3px;
  background: var(--border);
  z-index: 0;
  border-radius: 3px;
}
.tracker-fill {
  height: 100%;
  background: var(--rose);
  border-radius: 3px;
  transition: width 0.5s ease;
}
.t-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  z-index: 1;
}
.t-circle {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2.5px solid var(--border);
  background: var(--panel);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.82rem;
  transition: all 0.25s;
}
.t-circle.done   { background: var(--rose); border-color: var(--rose); color: #fff; }
.t-circle.active { border-color: var(--rose); color: var(--rose); font-weight: 700; }
.t-label {
  font-size: 0.68rem;
  color: var(--ink-faint);
  text-align: center;
  max-width: 58px;
  line-height: 1.3;
}
.t-label.done   { color: var(--rose); font-weight: 600; }
.t-label.active { color: var(--ink);  font-weight: 600; }
.cancelled-bar {
  text-align: center;
  color: var(--red);
  font-weight: 600;
  font-size: 0.85rem;
  padding: 10px 0 4px;
  letter-spacing: 0.2px;
}
.order-actions { display: flex; gap: 8px; margin-top: 14px; }
.btn-cancel-order {
  padding: 7px 16px;
  background: var(--red-bg);
  color: var(--red);
  border: 1.5px solid #fecdd3;
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.16s;
}
.btn-cancel-order:hover { background: var(--red); color: #fff; }
.btn-return-order {
  padding: 7px 16px;
  background: var(--gray-bg);
  color: var(--gray);
  border: 1.5px solid #e5e7eb;
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.16s;
}
.btn-return-order:hover { background: var(--gray); color: #fff; }
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 10, 20, 0.55);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: var(--panel);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 28px;
  width: 400px;
  max-width: calc(100vw - 32px);
  box-shadow: 0 24px 64px rgba(15,10,20,0.18);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}
.modal-sub { font-size: 0.8rem; color: var(--ink-faint); margin-bottom: 16px; }
.modal-box textarea {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  color: var(--ink);
  background: var(--surface);
  height: 88px;
  resize: none;
  outline: none;
  transition: border-color 0.18s, background 0.18s;
}
.modal-box textarea:focus { border-color: var(--rose); background: #fff; }
.modal-btn-row { display: flex; gap: 10px; margin-top: 16px; }
.modal-btn-cancel {
  flex: 1; padding: 11px; border-radius: 9px;
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--ink-faint); font-family: 'Outfit', sans-serif;
  font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.16s;
}
.modal-btn-cancel:hover { border-color: var(--ink-faint); color: var(--ink); }
.modal-btn-submit {
  flex: 1; padding: 11px; border-radius: 9px;
  background: var(--rose); border: none;
  color: #fff; font-family: 'Outfit', sans-serif;
  font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.16s;
}
.modal-btn-submit:hover { background: var(--rose-dark); }
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  padding: 11px 22px;
  border-radius: 10px;
  font-size: 0.85rem;
  font-weight: 500;
  z-index: 9999;
  opacity: 0;
  transform: translateY(14px);
  transition: all 0.28s ease;
  pointer-events: none;
  font-family: 'Outfit', sans-serif;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-success { background: var(--green); color: #fff; }
.toast-error   { background: var(--red);   color: #fff; }
@media (max-width: 600px) {
  .topbar { padding: 0 16px; }
  .page { padding: 20px 14px 48px; }
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--rose-mid); border-radius: 6px; }
</style>
</head>
<body>

<header class="topbar">
  <a class="topbar-brand" href="home.html"><span>✿</span> Charulota</a>
  <nav class="topbar-nav">
    <a class="back-btn" href="home.html">← Back to Shop</a>
  </nav>
</header>

<div class="page">

  <div class="card">
    <div class="card-title">My Profile</div>
    <div class="profile-header">
      <div class="avatar" id="avatar-initials">—</div>
      <div>
        <div class="profile-meta-name" id="display-name">—</div>
        <div class="profile-meta-id">Customer ID: #<span id="display-id">—</span></div>
      </div>
    </div>
    <label class="field-label">Phone Number</label>
    <input type="tel" id="edit-phone" placeholder="No phone number saved">
    <label class="field-label">Delivery Address</label>
    <textarea id="edit-address" placeholder="No address saved"></textarea>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="location.href='home.html'">Back to Shopping</button>
      <button class="btn btn-save" onclick="updateProfile()">Save Changes</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">My Orders</div>
    <div id="orders-container">
      <p style="color:var(--ink-faint); font-size:0.88rem;">Loading orders…</p>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
if (!localStorage.getItem('customerId') || !localStorage.getItem('userName')) {
    window.location.href = 'login.html';
}

// ✅ Auth helper
function authHeaders() {
  const token = localStorage.getItem('token');
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`
  };
}

const cId   = localStorage.getItem('customerId');
const uName = localStorage.getItem('userName') || '';

const initials = uName.trim().split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase() || '?';
document.getElementById('avatar-initials').textContent = initials;
document.getElementById('display-name').textContent    = uName || '—';
document.getElementById('display-id').textContent      = cId  || '—';

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `toast show toast-${type}`;
  setTimeout(() => { el.className = 'toast'; }, 3000);
}

async function fetchProfile() {
  try {
    const res  = await fetch(`/api/customer/${cId}`, { headers: authHeaders() }); // ✅
    const data = await res.json();
    if (data) {
      document.getElementById('edit-phone').value   = data.PHONE_NUMBER || '';
      document.getElementById('edit-address').value = data.ADDRESS      || '';
    }
  } catch (e) { console.error('fetchProfile:', e); }
}

async function updateProfile() {
  const phone   = document.getElementById('edit-phone').value.trim();
  const address = document.getElementById('edit-address').value.trim();
  try {
    const res = await fetch('/api/customer/update-profile', {
      method: 'PUT',
      headers: authHeaders(), // ✅
      body: JSON.stringify({ customerId: cId, phone_number: phone, address }),
    });
    res.ok ? toast('Profile updated successfully!') : toast('Failed to save profile.', 'error');
  } catch { toast('Network error. Please try again.', 'error'); }
}

function buildTracker(status) {
  if (status === 'Cancelled') {
    return `<div class="cancelled-bar">✕ Order Cancelled</div>`;
  }
  const steps   = [
    { key: 'Pending',   label: 'Order Placed', icon: '◈' },
    { key: 'Shipped',   label: 'Shipped',       icon: '⟶' },
    { key: 'Delivered', label: 'Delivered',     icon: '✓' },
  ];
  const order   = ['Pending', 'Shipped', 'Delivered'];
  const idx     = order.indexOf(status);
  const fillPct = idx === 0 ? 0 : idx === 1 ? 50 : 100;
  const stepsHTML = steps.map((s, i) => {
    const cls = i < idx ? 'done' : i === idx ? 'active' : '';
    return `<div class="t-step">
      <div class="t-circle ${cls}">${s.icon}</div>
      <div class="t-label ${cls}">${s.label}</div>
    </div>`;
  }).join('');
  return `<div class="tracker-wrap">
    <div class="tracker">
      <div class="tracker-rail"><div class="tracker-fill" style="width:${fillPct}%"></div></div>
      ${stepsHTML}
    </div>
  </div>`;
}

async function cancelOrder(orderId) {
  if (!confirm(`Cancel Order #${orderId}? This cannot be undone.`)) return;
  try {
    const res = await fetch('/api/orders/cancel', {
      method: 'POST',
      headers: authHeaders(), // ✅
      body: JSON.stringify({ orderId, customerId: cId }),
    });
    if (res.ok) { toast('Order cancelled.'); fetchOrders(); }
    else        { const e = await res.json(); toast(e.error || 'Could not cancel.', 'error'); }
  } catch { toast('Network error.', 'error'); }
}

function requestReturn(orderId) {
  document.getElementById('return-modal')?.remove();
  const modal = document.createElement('div');
  modal.id        = 'return-modal';
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">Request Return</div>
      <div class="modal-sub">Order #${orderId}</div>
      <label style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--ink-faint);display:block;margin-bottom:6px;">Reason for return</label>
      <textarea id="return-reason" placeholder="e.g. Wrong size, damaged item…"></textarea>
      <div class="modal-btn-row">
        <button class="modal-btn-cancel" onclick="document.getElementById('return-modal').remove()">Cancel</button>
        <button class="modal-btn-submit" onclick="submitReturn(${orderId})">Submit Return</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function submitReturn(orderId) {
  const reason = document.getElementById('return-reason').value.trim();
  if (!reason) { toast('Please enter a reason.', 'error'); return; }
  try {
    const res = await fetch('/api/orders/return', {
      method: 'POST',
      headers: authHeaders(), // ✅
      body: JSON.stringify({ orderId, customerId: cId, reason }),
    });
    document.getElementById('return-modal').remove();
    if (res.ok) { toast('Return request submitted!'); fetchOrders(); }
    else        { const e = await res.json(); toast(e.error || 'Could not submit return.', 'error'); }
  } catch { toast('Network error.', 'error'); }
}

async function fetchOrders() {
  const container = document.getElementById('orders-container');
  try {
    const res  = await fetch(`/api/my-orders/${cId}`, { headers: authHeaders() }); // ✅
    const data = await res.json();

    if (!data.length) {
      container.innerHTML = `<p style="color:var(--ink-faint);font-size:0.88rem;">You haven't placed any orders yet.</p>`;
      return;
    }

    const map = {};
    const ids = [];
    data.forEach(row => {
      const [id, date, total, status, prodName, qty, price] = row;
      if (!map[id]) { map[id] = { date, total, status, items: [] }; ids.push(id); }
      map[id].items.push({ prodName, qty, price });
    });

    container.innerHTML = ids.map(oid => {
      const o = map[oid];
      let actions = '';
      if (o.status === 'Pending') {
        actions = `<button class="btn-cancel-order" onclick="cancelOrder(${oid})">✕ Cancel Order</button>`;
      } else if (o.status === 'Shipped') {
        actions = `<button class="btn-return-order" onclick="requestReturn(${oid})">↩ Return Item</button>`;
      } else if (o.status === 'Delivered') {
        actions = `
          <div style="display:flex; gap:8px; align-items:center;">
            <span style="color:var(--green); font-weight:700; font-size:0.85rem;">✓ Delivered</span>
            <button class="btn-return-order" onclick="requestReturn(${oid})">↩ Return Item</button>
          </div>`;
      }
      return `<div class="order-box" id="order-${oid}">
        <div class="order-top">
          <span class="order-id">#${oid}</span>
          <span class="tag tag-${o.status}">${o.status}</span>
        </div>
        <div class="order-date">
          Placed on ${new Date(o.date).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })}
        </div>
        ${o.items.map(i => `
          <div class="item-row">
            <span>${i.prodName} <span class="item-qty">× ${i.qty}</span></span>
            <span>$${(i.qty * i.price).toFixed(2)}</span>
          </div>`).join('')}
        <div class="order-total">Total: $${Number(o.total).toFixed(2)}</div>
        ${buildTracker(o.status)}
        ${actions ? `<div class="order-actions">${actions}</div>` : ''}
      </div>`;
    }).join('');

  } catch (e) {
    container.innerHTML = `<p style="color:var(--red);font-size:0.88rem;">Failed to load orders.</p>`;
    console.error('fetchOrders:', e);
  }
}

fetchProfile();
fetchOrders();
</script>
</body>
</html>
